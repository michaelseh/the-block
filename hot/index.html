<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>theblock.is/hot</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#101020;touch-action:none;user-select:none;-webkit-user-select:none}
canvas{display:block;image-rendering:pixelated;image-rendering:crisp-edges}
#gba-overlay{position:fixed;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:5;
  background:repeating-linear-gradient(to bottom,transparent 0px,transparent 2px,rgba(0,0,0,0.06) 2px,rgba(0,0,0,0.06) 4px);
  box-shadow:inset 0 0 120px rgba(0,0,0,0.2);
  mix-blend-mode:multiply}
#toolbar{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);display:flex;gap:10px;padding:10px 16px;
  background:rgba(0,0,0,0.75);border-radius:20px;z-index:10;display:none;align-items:center;flex-wrap:nowrap;overflow-x:auto;max-width:95vw;justify-content:flex-start;-webkit-overflow-scrolling:touch}
.tool-item{display:flex;flex-direction:column;align-items:center;cursor:pointer;border:2px solid rgba(255,255,255,0.3);border-radius:8px;padding:6px 8px;transition:border-color 0.15s;min-width:44px;flex-shrink:0}
.tool-label{color:rgba(240,232,216,0.7);font-family:'Courier New',monospace;font-size:9px;margin-top:3px;text-transform:uppercase;letter-spacing:1px}
#instructions{position:fixed;bottom:auto;top:50%;left:50%;transform:translate(-50%,-50%);color:#282020;
  font-family:'Courier New',monospace;font-size:15px;font-weight:bold;text-align:center;line-height:1.9;
  z-index:10;pointer-events:none;max-width:440px;
  background:#E8E0D0;padding:18px 26px;border-radius:0;
  border:3px solid #888078;outline:2px solid #282020;letter-spacing:0.5px;
  box-shadow:4px 4px 0 #282020}
#monologue{position:fixed;display:none;background:#E8E0D0;color:#282020;padding:14px 18px;border-radius:0;
  font-family:'Courier New',monospace;font-size:14px;font-weight:bold;max-width:300px;line-height:1.6;
  box-shadow:4px 4px 0 #282020;z-index:20;pointer-events:none;image-rendering:pixelated;
  border:3px solid #888078;outline:2px solid #282020}
#monologue .name{font-weight:bold;color:#B05030;font-size:14px;margin-bottom:3px;letter-spacing:2px;text-transform:uppercase}
#monologue .label{font-style:italic;color:#906840;font-size:11px;margin-bottom:8px;letter-spacing:1px}
#char-label{position:fixed;display:none;background:rgba(0,0,0,0.8);color:#f0e8d8;
  padding:3px 8px;border-radius:2px;font-family:'Courier New',monospace;font-size:11px;
  z-index:15;pointer-events:none;white-space:nowrap;
  box-shadow:0 1px 0 rgba(0,0,0,0.5)}
#hint{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);color:rgba(240,232,216,0.7);
  font-family:'Courier New',monospace;font-size:13px;letter-spacing:2px;
  animation:pulse 2s ease-in-out infinite;z-index:10;pointer-events:none;display:none}
@keyframes pulse{0%,100%{opacity:0.3}50%{opacity:0.9}}
.scroll-arrow{position:fixed;top:50%;transform:translateY(-50%);color:#E8E0D0;
  font-family:'Courier New',monospace;font-size:48px;z-index:10;pointer-events:none;
  animation:arrowPulse 1.5s ease-in-out infinite;
  text-shadow:0 0 4px #282020,0 0 8px rgba(0,0,0,0.5);
  background:rgba(0,0,0,0.3);padding:4px 6px;border-radius:4px}
#arrow-l{left:12px}
#arrow-r{right:12px}
@keyframes arrowPulse{0%,100%{opacity:0.15;transform:translateY(-50%) translateX(0)}
  50%{opacity:0.6;transform:translateY(-50%) translateX(-4px)}}
#arrow-r{animation:arrowPulseR 1.5s ease-in-out infinite}
@keyframes arrowPulseR{0%,100%{opacity:0.15;transform:translateY(-50%) translateX(0)}
  50%{opacity:0.6;transform:translateY(-50%) translateX(4px)}}
#idle-prompt{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  background:#E8E0D0;color:#282020;font-family:'Courier New',monospace;font-size:16px;font-weight:bold;
  padding:24px 32px;border:3px solid #888078;outline:2px solid #282020;
  box-shadow:4px 4px 0 #282020;z-index:25;text-align:center;line-height:1.9;
  max-width:380px;cursor:pointer;text-transform:uppercase;letter-spacing:1px}
#idle-prompt .dismiss{color:#B05030;font-size:12px;margin-top:10px;letter-spacing:2px}
#sound-toggle{position:fixed;top:12px;right:12px;z-index:15;
  background:#E8E0D0;color:#282020;font-family:'Courier New',monospace;font-size:11px;font-weight:bold;
  padding:6px 12px;border:2px solid #888078;outline:1px solid #282020;
  box-shadow:2px 2px 0 #282020;cursor:pointer;text-transform:uppercase;letter-spacing:1px}
#sound-toggle:hover{background:#F0E8D8}
#sound-toggle.on{background:#006B3F;color:#F0F0E8;border-color:#00A060}
@media(max-width:600px){
  #toolbar{bottom:10px;gap:4px;padding:6px 8px;border-radius:14px;flex-wrap:nowrap;overflow-x:auto;max-width:95vw;justify-content:flex-start}
  .tool-item canvas{width:24px!important;height:24px!important}
  .tool-label{font-size:6px}
  #instructions{font-size:13px;max-width:88vw;bottom:auto;top:50%;left:50%;transform:translate(-50%,-50%);padding:14px 18px;line-height:1.7}
  #monologue{max-width:75vw;font-size:11px;padding:10px 12px;max-height:40vh;overflow-y:auto}
  #monologue .name{font-size:12px}
  #monologue .label{font-size:10px}
  #idle-prompt{max-width:85vw;font-size:14px;padding:18px 22px}
  .scroll-arrow{font-size:32px}
  #arrow-l{left:4px}#arrow-r{right:4px}
  #hint{font-size:11px;bottom:60px}
}
@media(min-width:601px) and (max-width:1024px){
  #toolbar{bottom:15px;gap:6px;padding:7px 12px}
  #instructions{max-width:380px;bottom:auto;top:50%;left:50%;transform:translate(-50%,-50%)}
  #monologue{max-width:280px;font-size:13px}
}
@media(max-height:500px){
  #toolbar{bottom:6px;gap:4px;padding:5px 8px;border-radius:12px;flex-wrap:nowrap;overflow-x:auto;max-width:95vw;justify-content:flex-start}
  .tool-item canvas{width:24px!important;height:24px!important}
  .tool-item{padding:4px 6px}
  .tool-label{font-size:6px}
  #instructions{font-size:12px;max-width:70vw;padding:10px 14px;line-height:1.5}
  #monologue{max-width:50vw;font-size:11px;max-height:60vh}
  #idle-prompt{max-width:70vw;font-size:13px;padding:14px 18px}
  #hint{bottom:55px}
  .scroll-arrow{font-size:32px}
}
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="gba-overlay"></div>
<div id="toolbar"></div>
<div id="monologue"></div>
<div id="char-label"></div>
<div id="hint">- scroll and tap characters -</div>
<div id="instructions"></div>
<div id="arrow-l" class="scroll-arrow">&lsaquo;</div>
<div id="arrow-r" class="scroll-arrow">&rsaquo;</div>
<div id="sound-toggle">SFX: OFF</div>
<div id="idle-prompt" style="display:none"></div>
<script>
(function(){
'use strict';

// ═══════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════
var WORLD_W = 900;
var WORLD_H = 240;
var BUILDING_BASE = 186;
var SIDEWALK_TOP = 186;
var SIDEWALK_BOT = 206;
var ROAD_Y = 206;
var CHAR_FEET = 198;

// ═══════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════
var cameraX = 200;
var scale = 1;
var viewW = 400;
var lastTime = 0;
var gameTime = 0;
var skyDirty = true;
var buildingsDirty = true;
var steamFrame = 0;

// ═══════════════════════════════════════════
// CANVAS SETUP
// ═══════════════════════════════════════════
var canvas = document.getElementById('game');
var ctx = canvas.getContext('2d');

var comp = document.createElement('canvas');
var cctx = comp.getContext('2d');

var skyLayer = document.createElement('canvas');
var skyCtx = skyLayer.getContext('2d');
var bgLayer = document.createElement('canvas');
var bgCtx = bgLayer.getContext('2d');
var bldgLayer = document.createElement('canvas');
var bldgCtx = bldgLayer.getContext('2d');

skyLayer.width = WORLD_W; skyLayer.height = WORLD_H;
bgLayer.width = WORLD_W; bgLayer.height = WORLD_H;
bldgLayer.width = WORLD_W; bldgLayer.height = WORLD_H;

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  scale = canvas.height / WORLD_H;
  viewW = Math.ceil(canvas.width / scale);
  comp.width = viewW + 4;
  comp.height = WORLD_H;
  skyDirty = true;
  buildingsDirty = true;
}
resize();
window.addEventListener('resize', resize);
window.addEventListener('orientationchange', function(){setTimeout(resize,150)});

// ═══════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════
function clamp(v,a,b){return Math.max(a,Math.min(b,v))}
function lerp(a,b,t){return a+(b-a)*t}
function randInt(a,b){return Math.floor(Math.random()*(b-a+1))+a}

function parseHex(h){return[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)]}
function toHex(r,g,b){return'#'+[r,g,b].map(function(v){return clamp(Math.round(v),0,255).toString(16).padStart(2,'0')}).join('')}
function lerpColor(a,b,t){var c1=parseHex(a),c2=parseHex(b);return toHex(lerp(c1[0],c2[0],t),lerp(c1[1],c2[1],t),lerp(c1[2],c2[2],t))}
function gba(hex){var c=parseHex(hex);return toHex((c[0]>>3)<<3,(c[1]>>3)<<3,(c[2]>>3)<<3)}

// ═══════════════════════════════════════════
// PIXEL FONT (3x5)
// ═══════════════════════════════════════════
var FONT={
A:'010101111101101',B:'110101110101110',C:'011100100100011',D:'110101101101110',
E:'111100110100111',F:'111100110100100',G:'011100101101011',H:'101101111101101',
I:'111010010010111',J:'001001001101010',K:'101110100110101',L:'100100100100111',
M:'101111101101101',N:'111101101101101',O:'010101101101010',P:'110101110100100',
Q:'010101101011011',R:'110101110101101',S:'011100010001110',T:'111010010010010',
U:'101101101101010',V:'101101101010010',W:'101101101111010',X:'101101010101101',
Y:'101101010010010',Z:'111001010100111',
'0':'010101101101010','1':'010110010010111','2':'110001010100111','3':'110001010001110',
'4':'101101111001001','5':'111100110001110','6':'011100110101010','7':'111001010010010',
'8':'010101010101010','9':'010101011001010',
'$':'010111100011010','.':'000000000000010',',':'000000000010100',
'!':'010010010000010','?':'110001010000010',"'":'010010000000000',
'-':'000000111000000','/':'001001010100100',' ':'000000000000000',
':':'000010000010000'
};
function drawText(c,text,x,y,color,sz){
  sz=sz||1;c.fillStyle=color;var cx=x;
  for(var i=0;i<text.length;i++){
    var ch=text[i].toUpperCase(),data=FONT[ch];
    if(data){for(var j=0;j<15;j++){if(data[j]==='1')c.fillRect(cx+(j%3)*sz,y+Math.floor(j/3)*sz,sz,sz)}}
    cx+=4*sz;
  }
}

// ═══════════════════════════════════════════
// DITHERING
// ═══════════════════════════════════════════
var BAYER4=[[0,8,2,10],[12,4,14,6],[3,11,1,9],[15,7,13,5]];

function ditherRect(c,x,y,w,h,c1,c2,thr){
  for(var py=0;py<h;py++){for(var px=0;px<w;px++){
    var b=BAYER4[(y+py)&3][(x+px)&3]/16;
    c.fillStyle=thr>b?c2:c1;c.fillRect(x+px,y+py,1,1);
  }}
}
function ditherGradV(c,x,y,w,h,colors){
  for(var py=0;py<h;py++){
    var t=py/h;var i0=0;
    for(var i=0;i<colors.length-1;i++){if(t>=colors[i].p&&t<=colors[i+1].p){i0=i;break}}
    var lt=colors[i0].p===colors[i0+1].p?0:(t-colors[i0].p)/(colors[i0+1].p-colors[i0].p);
    for(var px=0;px<w;px++){
      var b=BAYER4[(y+py)&3][(x+px)&3]/16;
      c.fillStyle=lt>b?colors[i0+1].c:colors[i0].c;
      c.fillRect(x+px,y+py,1,1);
    }
  }
}
function ditherCircle(c,cx,cy,r,color,density){
  c.fillStyle=color;
  for(var py=-r;py<=r;py++){for(var px=-r;px<=r;px++){
    if(px*px+py*py>r*r)continue;
    var d=Math.sqrt(px*px+py*py)/r;
    var b=BAYER4[(cy+py)&3][(cx+px)&3]/16;
    if((1-d)*density>b)c.fillRect(cx+px,cy+py,1,1);
  }}
}

// ═══════════════════════════════════════════
// TIME OF DAY
// ═══════════════════════════════════════════
function getTimeInfo(){
  var now=new Date(),h=now.getHours()+now.getMinutes()/60;
  var period,skyColors,brightness;
  if(h>=6&&h<10){
    period='morning';var t=(h-6)/4;
    skyColors=[
      {p:0,c:gba(lerpColor('#283858','#304878',t))},
      {p:0.3,c:gba(lerpColor('#6858A0','#6888C0',t))},
      {p:0.6,c:gba(lerpColor('#D89070','#90B8D8',t))},
      {p:1,c:gba(lerpColor('#F0C890','#C8D8E8',t))}];
    brightness=lerp(0.6,1,t);
  }else if(h>=10&&h<16){
    period='midday';
    skyColors=[{p:0,c:gba('#3860A8')},{p:0.35,c:gba('#6890D0')},{p:0.65,c:gba('#90B8E0')},{p:1,c:gba('#C0D8F0')}];
    brightness=1;
  }else if(h>=16&&h<19){
    period='golden';var t=(h-16)/3;
    skyColors=[
      {p:0,c:gba(lerpColor('#3050A0','#282058',t))},
      {p:0.3,c:gba(lerpColor('#6878B8','#6848A0',t))},
      {p:0.6,c:gba(lerpColor('#D89868','#E07050',t))},
      {p:1,c:gba(lerpColor('#F0C070','#F0A060',t))}];
    brightness=lerp(1,0.65,t);
  }else if(h>=19&&h<21){
    period='dusk';var t=(h-19)/2;
    skyColors=[
      {p:0,c:gba(lerpColor('#201848','#101030',t))},
      {p:0.3,c:gba(lerpColor('#483878','#201848',t))},
      {p:0.6,c:gba(lerpColor('#A05070','#483060',t))},
      {p:1,c:gba(lerpColor('#E08060','#382848',t))}];
    brightness=lerp(0.65,0.3,t);
  }else{
    period='night';
    skyColors=[{p:0,c:gba('#080818')},{p:0.35,c:gba('#101028')},{p:0.65,c:gba('#181838')},{p:1,c:gba('#202048')}];
    brightness=0.25;
  }
  return{period:period,sky:skyColors,bright:brightness,hour:h};
}

// brightness-aware color helper
function bc(hex,time){
  if(time.bright>=0.95)return gba(hex);
  var c=parseHex(hex);
  var f=time.bright;
  // mix toward a night tint
  var nr=32,ng=24,nb=48;
  return gba(toHex(lerp(nr,c[0],f),lerp(ng,c[1],f),lerp(nb,c[2],f)));
}

// ═══════════════════════════════════════════
// SKY
// ═══════════════════════════════════════════
function renderSky(){
  skyCtx.clearRect(0,0,WORLD_W,WORLD_H);
  var time=getTimeInfo();
  ditherGradV(skyCtx,0,0,WORLD_W,140,time.sky);
  // stars at night/dusk
  if(time.bright<0.5){
    skyCtx.fillStyle='#F0E8D8';
    for(var sy=0;sy<90;sy++){for(var sx=0;sx<WORLD_W;sx++){
      if(((sx*7919+sy*6271+sx*sy)%10000)/10000<(time.bright<0.3?0.003:0.001))
        skyCtx.fillRect(sx,sy,1,1);
    }}
  }
  // clouds
  if(time.bright>0.3){
    var cc=time.period==='golden'?'#F0D0A0':time.period==='dusk'?'#A08888':'#E0D8D0';
    var ch=time.period==='golden'?'#F8E0B8':'#F0E8E0';
    drawCloud(skyCtx,80,22,35,9,cc,ch);
    drawCloud(skyCtx,300,12,45,11,cc,ch);
    drawCloud(skyCtx,560,28,30,8,cc,ch);
    drawCloud(skyCtx,780,18,38,10,cc,ch);
  }
  skyDirty=false;
}
function drawCloud(c,x,y,w,h,color,highlight){
  for(var py=0;py<h;py++){
    var rw=Math.floor(w*Math.sin(Math.PI*py/h));
    var rx=x+Math.floor((w-rw)/2);
    for(var px=0;px<rw;px++){
      var edge=Math.min(px,rw-px)/(rw*0.3);
      var b=BAYER4[(y+py)&3][(x+px)&3]/16;
      if(edge>b||edge>1){
        c.fillStyle=py<h/3?gba(highlight):gba(color);
        c.fillRect(rx+px,y+py,1,1);
      }
    }
  }
}

// ═══════════════════════════════════════════
// BACKGROUND
// ═══════════════════════════════════════════
function renderBackground(){
  bgCtx.clearRect(0,0,WORLD_W,WORLD_H);
  var time=getTimeInfo();
  // distant LA mountains — jagged angular ridgeline
  // back range (lighter, taller)
  var mc1=bc('#C0B8B0',time),ms1=bc('#B0A8A0',time);
  var peaks1=[{x:0,h:8},{x:40,h:14},{x:90,h:22},{x:130,h:16},{x:170,h:25},{x:220,h:18},{x:260,h:12},{x:310,h:20},{x:360,h:28},{x:400,h:15},{x:450,h:23},{x:500,h:17},{x:540,h:26},{x:590,h:14},{x:640,h:21},{x:680,h:10},{x:730,h:24},{x:780,h:19},{x:830,h:27},{x:880,h:13},{x:920,h:8}];
  for(var x=0;x<WORLD_W;x++){
    var seg=0;for(var p=0;p<peaks1.length-1;p++){if(x>=peaks1[p].x&&x<peaks1[p+1].x){seg=p;break;}}
    var p0=peaks1[seg],p1=peaks1[seg+1]||p0;
    var t=(x-p0.x)/(p1.x-p0.x||1);
    var hh=p0.h+(p1.h-p0.h)*t+Math.sin(x*0.15)*1.5;
    bgCtx.fillStyle=mc1;bgCtx.fillRect(x,118-hh,1,Math.ceil(hh));
    // ridge shading
    for(var dy=0;dy<2;dy++){var b=BAYER4[(118-Math.floor(hh)+dy)&3][x&3]/16;if(0.35>b){bgCtx.fillStyle=ms1;bgCtx.fillRect(x,118-Math.floor(hh)+dy,1,1);}}
  }
  // front range (darker, shorter, more jagged)
  var mc2=bc('#A8A098',time),ms2=bc('#989088',time);
  var peaks2=[{x:0,h:5},{x:35,h:10},{x:65,h:7},{x:100,h:15},{x:140,h:9},{x:180,h:13},{x:210,h:6},{x:250,h:16},{x:290,h:8},{x:330,h:12},{x:370,h:18},{x:410,h:7},{x:440,h:14},{x:480,h:9},{x:520,h:11},{x:560,h:17},{x:600,h:8},{x:640,h:13},{x:670,h:6},{x:710,h:15},{x:750,h:10},{x:790,h:14},{x:830,h:7},{x:870,h:12},{x:920,h:5}];
  for(var x=0;x<WORLD_W;x++){
    var seg=0;for(var p=0;p<peaks2.length-1;p++){if(x>=peaks2[p].x&&x<peaks2[p+1].x){seg=p;break;}}
    var p0=peaks2[seg],p1=peaks2[seg+1]||p0;
    var t=(x-p0.x)/(p1.x-p0.x||1);
    var hh=p0.h+(p1.h-p0.h)*t+Math.sin(x*0.22)*1;
    bgCtx.fillStyle=mc2;bgCtx.fillRect(x,118-hh,1,Math.ceil(hh));
    for(var dy=0;dy<2;dy++){var b=BAYER4[(118-Math.floor(hh)+dy)&3][x&3]/16;if(0.3>b){bgCtx.fillStyle=ms2;bgCtx.fillRect(x,118-Math.floor(hh)+dy,1,1);}}
  }
  // palm trees
  var palms=[45,160,310,415,570,710,845];
  for(var i=0;i<palms.length;i++)drawPalm(bgCtx,palms[i],78,time);
  // power lines
  drawPowerLines(bgCtx,time);
  // billboard
  drawBillboard(bgCtx,420,42,time);
}

function drawPalm(c,x,by,time){
  var tc=bc('#887060',time),td=bc('#705848',time);
  // trunk
  for(var ty=0;ty<48;ty++){
    var tw=ty<8?3:2;
    var tx=x-Math.floor(tw/2)+Math.round(Math.sin(ty*0.12));
    c.fillStyle=ty%5===0?td:tc;
    c.fillRect(tx,by+ty,tw,1);
  }
  // fronds
  var lc=bc('#608848',time),ld=bc('#78A058',time);
  var angles=[-2.3,-1.6,-0.9,-0.3,0.3,0.9,1.6,2.3];
  for(var a=0;a<angles.length;a++){
    var ang=angles[a],len=16+((x*7+a*13)%6);
    for(var i=0;i<len;i++){
      var fx=x+Math.cos(ang)*i+Math.sin(i*0.35)*1.5;
      var fy=by-1+Math.sin(ang)*i*0.45+i*0.35;
      c.fillStyle=i<len*0.55?lc:ld;
      c.fillRect(Math.round(fx),Math.round(fy),1,1);
      if(i<len*0.75)c.fillRect(Math.round(fx),Math.round(fy)+1,1,1);
    }
  }
}
function drawPowerLines(c,time){
  var lc=bc('#606058',time);c.fillStyle=lc;
  var poles=[135,390,640,860];
  for(var i=0;i<poles.length;i++){
    c.fillRect(poles[i],72,2,56);
    c.fillRect(poles[i]-4,72,10,1);
    c.fillRect(poles[i]-3,73,8,1);
  }
  c.fillStyle=lc;
  for(var i=0;i<poles.length-1;i++){
    var x1=poles[i],x2=poles[i+1];
    for(var x=x1;x<x2;x++){
      var t=(x-x1)/(x2-x1),sag=Math.sin(t*Math.PI)*6;
      c.fillRect(x,74+Math.round(sag),1,1);
    }
  }
}

var billboardAd=BILLBOARD_ADS[randInt(0,BILLBOARD_ADS.length-1)];
function drawBillboard(c,x,y,time){
  var ad=billboardAd;
  var bw=90,bh=50;
  var bg=bc(ad.bg,time),tc=bc(ad.tc||'#383028',time),fr=bc('#888078',time);
  // frame
  c.fillStyle=fr;c.fillRect(x,y,bw,bh);
  c.fillStyle=bg;c.fillRect(x+2,y+2,bw-4,bh-4);
  // outline
  c.fillStyle=bc('#282020',time);
  c.fillRect(x-1,y-1,bw+2,1);c.fillRect(x-1,y+bh,bw+2,1);
  c.fillRect(x-1,y,1,bh);c.fillRect(x+bw,y,1,bh);
  // vertically center all text inside billboard
  var totalLines=ad.lines.length+ad.sub.length;
  var lineH=7;
  var gap=2;
  var totalH=totalLines*lineH+gap;
  var startY=y+Math.max(4,Math.floor((bh-totalH)/2));
  // main text — each char is 4px wide (3px glyph + 1px gap)
  for(var i=0;i<ad.lines.length;i++){
    var txt=ad.lines[i];var tw=txt.length*4;
    var tx=x+Math.max(3,Math.floor((bw-tw)/2));
    drawText(c,txt,tx,startY+i*lineH,tc,1);
  }
  // sub text
  var subY=startY+ad.lines.length*lineH+gap;
  var sc=ad.sc||['#906840','#B05030'];
  for(var i=0;i<ad.sub.length;i++){
    var txt=ad.sub[i];var tw=txt.length*4;
    var tx=x+Math.max(3,Math.floor((bw-tw)/2));
    drawText(c,txt,tx,subY+i*lineH,bc(sc[i%sc.length],time),1);
  }
  // legs
  c.fillStyle=fr;
  c.fillRect(x+18,y+bh,2,24);c.fillRect(x+bw-20,y+bh,2,24);
}

// Generic storefront renderer
function drawStorefront(c,x,y,w,h,time,opts){
  var wallC=bc(opts.wall,time),wallDk=bc(opts.wallDk,time);
  var outline=bc('#282020',time);

  // wall fill
  if(opts.brick){
    drawBrick(c,x,y,w,h,wallC,wallDk,bc('#907060',time));
  }else{
    c.fillStyle=wallC;c.fillRect(x,y,w,h);
    // stucco texture (subtle dithering)
    ditherRect(c,x,y,w,h,wallC,wallDk,0.12);
  }

  // outline
  c.fillStyle=outline;
  c.fillRect(x-1,y-1,w+2,1);c.fillRect(x-1,y+h,w+2,1);
  c.fillRect(x-1,y,1,h);c.fillRect(x+w,y,1,h);

  // roof line
  c.fillStyle=bc('#605850',time);
  c.fillRect(x,y-1,w,2);
  c.fillStyle=bc('#787068',time);
  c.fillRect(x,y-2,w,1);

  // awning
  if(opts.awning){
    var aw=w-4,ah=8,ax=x+2,ay=y+4;
    c.fillStyle=bc(opts.awning,time);c.fillRect(ax,ay,aw,ah);
    // stripes
    c.fillStyle=bc(opts.awningStripe,time);
    for(var s=0;s<aw;s+=6){c.fillRect(ax+s,ay,3,ah)}
    // awning shadow
    c.fillStyle=outline;c.fillRect(ax-1,ay+ah,aw+2,1);
    // dithered shadow below awning
    for(var dy=0;dy<4;dy++){for(var dx=0;dx<aw;dx++){
      var b=BAYER4[(ay+ah+1+dy)&3][(ax+dx)&3]/16;
      if(0.3*(1-dy/4)>b){c.fillStyle='rgba(0,0,0,0.25)';c.fillRect(ax+dx,ay+ah+1+dy,1,1)}
    }}
  }

  // sign
  if(opts.sign){
    var sw=opts.sign.length*4+4,sh=7;
    var sx=x+Math.floor((w-sw)/2),sy=y+(opts.awning?2:5);
    if(opts.signBg){
      c.fillStyle=bc(opts.signBg,time);c.fillRect(sx-1,sy-1,sw+2,sh+2);
    }
    drawText(c,opts.sign,sx,sy,bc(opts.signColor,time),1);
  }

  // window
  var wy=y+Math.floor(h*opts.windowY);
  var wh=Math.floor(h*opts.windowH);
  var wx=opts.doorX<0.5?x+Math.floor(opts.doorW)+6:x+4;
  var ww=w-(opts.doorX<0.5?Math.floor(opts.doorW)+10:Math.floor(opts.doorW)+10);
  // window frame
  c.fillStyle=outline;c.fillRect(wx-1,wy-1,ww+2,wh+2);
  // glass
  if(opts.frosted){
    ditherRect(c,wx,wy,ww,wh,bc(opts.interior,time),bc('#D0D8D8',time),0.4);
  }else{
    c.fillStyle=bc(opts.interior,time);c.fillRect(wx,wy,ww,wh);
    // interior glow at night
    if(time.bright<0.6){
      ditherRect(c,wx,wy,ww,wh,bc(opts.interior,time),bc('#F0E0C0',time),0.2*(1-time.bright));
    }
    // glass reflection (dithered highlight on top portion)
    ditherRect(c,wx,wy,ww,Math.floor(wh*0.3),bc(opts.interior,time),
      bc(time.bright>0.5?'#F0F0F8':'#A0A8B0',time),0.2);
  }

  // door
  var dx=x+Math.floor(w*opts.doorX);
  var dh=Math.floor(h*0.55);
  var dy=y+h-dh;
  c.fillStyle=opts.darkDoor?bc('#383030',time):bc('#604830',time);
  c.fillRect(dx,dy,opts.doorW,dh);
  c.fillStyle=outline;
  c.fillRect(dx-1,dy-1,opts.doorW+2,1);c.fillRect(dx-1,dy,1,dh);
  c.fillRect(dx+opts.doorW,dy,1,dh);
  // door handle
  c.fillStyle=bc('#C0B8A0',time);
  c.fillRect(dx+(opts.doorX<0.5?opts.doorW-3:2),dy+Math.floor(dh/2),1,2);

  // custom detail
  if(opts.detail)opts.detail(c,x,y,w,h);
  // re-draw door on top of detail to prevent overlap
  if(opts.detail){
    c.fillStyle=opts.darkDoor?bc('#383030',time):bc('#604830',time);
    c.fillRect(dx,dy,opts.doorW,dh);
    c.fillStyle=outline;
    c.fillRect(dx-1,dy-1,opts.doorW+2,1);c.fillRect(dx-1,dy,1,dh);
    c.fillRect(dx+opts.doorW,dy,1,dh);
    c.fillStyle=bc('#C0B8A0',time);
    c.fillRect(dx+(opts.doorX<0.5?opts.doorW-3:2),dy+Math.floor(dh/2),1,2);
  }
}

function drawBrick(c,x,y,w,h,color,mortar,dk){
  c.fillStyle=color;c.fillRect(x,y,w,h);
  // brick pattern
  for(var row=0;row<h;row+=4){
    var off=(Math.floor(row/4)%2)*5;
    c.fillStyle=mortar;
    c.fillRect(x,y+row+3,w,1);
    for(var col=off;col<w;col+=10){
      c.fillRect(x+col,y+row,1,4);
    }
    // brick shading (dithered)
    for(var col=0;col<w;col+=10){
      var bx=x+((Math.floor(row/4)%2)*5+col)%w;
      if(bx+8<=x+w){
        // dark edge on brick
        c.fillStyle=dk;
        c.fillRect(bx,y+row+2,Math.min(9,x+w-bx),1);
      }
    }
  }
}

function drawMuralWall(c,x,y,w,h,time){
  // concrete base
  var wc=bc('#B0A898',time);
  c.fillStyle=wc;c.fillRect(x,y,w,h);
  ditherRect(c,x,y,w,h,wc,bc('#A09888',time),0.1);
  // outline
  c.fillStyle=bc('#282020',time);
  c.fillRect(x-1,y-1,w+2,1);c.fillRect(x-1,y+h,w+2,1);
  c.fillRect(x-1,y,1,h);c.fillRect(x+w,y,1,h);
  // colorful mural - abstract pixel art
  var muralColors=['#D04040','#E88030','#E8D040','#40B060','#4080D0','#8040C0','#D060A0','#40C0C0'];
  // deterministic "random" mural pattern
  for(var my=4;my<h-4;my+=3){
    for(var mx=3;mx<w-3;mx+=3){
      var hash=((mx*31+my*17+x*7)%muralColors.length);
      var hash2=((mx*13+my*23)%100)/100;
      if(hash2<0.85){
        c.fillStyle=bc(muralColors[hash],time);
        var bw=2+((mx*7+my*3)%2),bh=2+((mx*3+my*7)%2);
        c.fillRect(x+mx,y+my,bw,bh);
      }
    }
  }
  // some structured elements in the mural
  // big eye
  c.fillStyle=bc('#F0E8D0',time);
  c.fillRect(x+15,y+15,14,8);
  c.fillStyle=bc('#282020',time);
  c.fillRect(x+20,y+17,4,4);
  c.fillStyle=bc('#F0F0F8',time);
  c.fillRect(x+21,y+17,1,1);
  // LA text
  drawText(c,'LA',x+38,y+12,bc('#F0E8D0',time),2);
  // heart
  c.fillStyle=bc('#D04060',time);
  c.fillRect(x+10,y+30,3,3);c.fillRect(x+14,y+30,3,3);
  c.fillRect(x+9,y+33,9,2);c.fillRect(x+10,y+35,7,2);
  c.fillRect(x+11,y+37,5,1);c.fillRect(x+12,y+38,3,1);
}

var isDragging=false,dragStartX=0,dragStartY=0,dragStartCamX=0,velocity=0,dragMoved=false;
var dragMode='none',dragChar=null;
var maxCamX=function(){return Math.max(0,WORLD_W-viewW)};

function hitTestChar(screenX,screenY){
  var wx=screenX/scale+cameraX,wy=screenY/scale;
  for(var i=chars.length-1;i>=0;i--){
    var ch=chars[i],cx=ch.x-5,cy=CHAR_FEET-ch.spriteH-4;
    if(wx>=cx&&wx<=cx+24&&wy>=cy&&wy<=cy+ch.spriteH+8)return ch;
  }
  return null;
}

function handleTap(sx,sy){
  var wx=sx/scale+cameraX;
  // Tool placement
  if(selectedTool){
    placeObject(selectedTool,wx);selectedTool=null;
    document.getElementById('toolbar').querySelectorAll('.tool-item').forEach(function(el){el.style.borderColor='rgba(255,255,255,0.3)'});
    return;
  }
  var ch=hitTestChar(sx,sy);
  if(ch){showMonologue(ch);return}
  hideMonologue();
}

function showMonologue(ch){
  var lines=MONOLOGUES[ch.def.id];
  if(!lines||!lines.length)return;
  sfxTap();
  var line=lines[Math.floor(Math.random()*lines.length)];
  var el=document.getElementById('monologue');
  el.innerHTML='<div class="name">'+ch.def.name+'</div><div class="label">'+ch.def.label+'</div>'+line;
  el.style.display='block';
  activeMonologue=ch;monologueTimer=5;
  positionMonologue();
  document.getElementById('hint').style.display='none';
}
function hideMonologue(){
  document.getElementById('monologue').style.display='none';activeMonologue=null;
}
function positionMonologue(){
  if(!activeMonologue)return;
  var ch=activeMonologue;
  var sx=(ch.x-cameraX)*scale,sy=(CHAR_FEET-ch.spriteH-6)*scale;
  var el=document.getElementById('monologue');
  var w=el.offsetWidth||200,h=el.offsetHeight||60;
  var x=sx-w/2,y=sy-h-12;
  x=clamp(x,8,window.innerWidth-w-8);
  y=clamp(y,8,window.innerHeight-120);
  el.style.left=Math.round(x)+'px';el.style.top=Math.round(y)+'px';
}

function checkHover(sx,sy){
  var ch=hitTestChar(sx,sy);
  var lbl=document.getElementById('char-label');
  if(ch){
    lbl.textContent=ch.def.name+' \u2014 '+ch.def.label;
    lbl.style.display='block';
    lbl.style.left=(sx+15)+'px';lbl.style.top=(sy-25)+'px';
    if(!isDragging)setCursor('hover');
    hoveredChar=ch;
  }else{
    lbl.style.display='none';
    if(!isDragging)setCursor(selectedTool?'place':'default');
    hoveredChar=null;
  }
}

canvas.addEventListener('mousedown',function(e){
  isDragging=true;dragStartX=e.clientX;dragStartY=e.clientY;
  dragStartCamX=cameraX;velocity=0;dragMoved=false;
  dragChar=hitTestChar(e.clientX,e.clientY);
  dragMode=dragChar?'char':'scroll';
  setCursor('grab');
});
window.addEventListener('mousemove',function(e){
  if(isDragging){
    if(Math.abs(e.clientX-dragStartX)>4||Math.abs(e.clientY-dragStartY)>4)dragMoved=true;
    if(dragMoved){
      if(dragMode==='char'&&dragChar){
        dragChar.x=e.clientX/scale+cameraX;dragChar.dragY=e.clientY/scale;
        dragChar.beingDragged=true;dragChar.walking=false;
      }else{var dx=(e.clientX-dragStartX)/scale;cameraX=clamp(dragStartCamX-dx,0,maxCamX())}
    }
  }else{checkHover(e.clientX,e.clientY)}
});
window.addEventListener('mouseup',function(e){
  // tool drag: place object where mouse released on canvas
  if(selectedTool&&dragMode==='tool'){
    var wx=e.clientX/scale+cameraX;
    placeObject(selectedTool,wx);selectedTool=null;dragMode='none';
    document.getElementById('toolbar').querySelectorAll('.tool-item').forEach(function(el){el.style.borderColor='rgba(255,255,255,0.3)'});
    setCursor('default');return;
  }
  if(isDragging&&!dragMoved)handleTap(e.clientX,e.clientY);
  else if(isDragging&&dragMoved){
    if(dragMode==='char'&&dragChar){dropCharacter(dragChar)}
    else{var dx=(e.clientX-dragStartX)/scale;velocity=-dx*0.8}
  }
  isDragging=false;dragMode='none';dragChar=null;setCursor(selectedTool?'place':'default');
});
canvas.addEventListener('touchstart',function(e){
  var t=e.touches[0];isDragging=true;dragStartX=t.clientX;dragStartY=t.clientY;
  dragStartCamX=cameraX;velocity=0;dragMoved=false;
  dragChar=hitTestChar(t.clientX,t.clientY);
  dragMode=dragChar?'char':'scroll';
  e.preventDefault();
},{passive:false});
canvas.addEventListener('touchmove',function(e){
  if(!isDragging)return;var t=e.touches[0];
  if(Math.abs(t.clientX-dragStartX)>4||Math.abs(t.clientY-dragStartY)>4)dragMoved=true;
  if(dragMoved){
    if(dragMode==='char'&&dragChar){
      dragChar.x=t.clientX/scale+cameraX;dragChar.dragY=t.clientY/scale;
      dragChar.beingDragged=true;dragChar.walking=false;
    }else{var dx=(t.clientX-dragStartX)/scale;cameraX=clamp(dragStartCamX-dx,0,maxCamX())}
  }
  e.preventDefault();
},{passive:false});
canvas.addEventListener('touchend',function(e){
  // tool drag on touch: place where finger lifted
  if(selectedTool&&dragMode==='tool'&&e.changedTouches&&e.changedTouches[0]){
    var t=e.changedTouches[0];var wx=t.clientX/scale+cameraX;
    placeObject(selectedTool,wx);selectedTool=null;dragMode='none';
    document.getElementById('toolbar').querySelectorAll('.tool-item').forEach(function(el){el.style.borderColor='rgba(255,255,255,0.3)'});
    return;
  }
  if(isDragging&&!dragMoved)handleTap(dragStartX,dragStartY);
  else if(isDragging&&dragMoved&&dragMode==='char'&&dragChar)dropCharacter(dragChar);
  else if(isDragging&&dragMoved&&dragMode==='scroll'&&e.changedTouches&&e.changedTouches[0]){
    var dx=(e.changedTouches[0].clientX-dragStartX)/scale;velocity=-dx*0.8;
  }
  isDragging=false;dragMode='none';dragChar=null;
},{passive:false});
canvas.addEventListener('wheel',function(e){
  var d=Math.abs(e.deltaX)>Math.abs(e.deltaY)?e.deltaX:e.deltaY;
  cameraX=clamp(cameraX+d*0.5,0,maxCamX());e.preventDefault();
},{passive:false});

function pick(arr){return arr[randInt(0,arr.length-1)]}
function shuffle(arr){for(var i=arr.length-1;i>0;i--){var j=randInt(0,i);var t=arr[i];arr[i]=arr[j];arr[j]=t}return arr}

function generateRandomChars(count){
  var pool=shuffle(GEN_NAMES.slice());
  var labelPool=shuffle(GEN_LABELS.slice());
  var generated=[];
  for(var i=0;i<count&&i<pool.length;i++){
    var nm=pool[i],isFem=nm.g==='f';
    var id='gen_'+i;
    var hat=pick(GEN_HATS);
    var ht=hat?null:pick(isFem?['long','bun','up',null]:['short',null,null]);
    var bw=isFem?randInt(6,7):randInt(8,10);
    var style={
      skin:pick(GEN_SKINS),hairColor:pick(GEN_HAIR),
      shirt:pick(GEN_SHIRTS),pants:pick(GEN_PANTS),shoes:pick(GEN_SHOES),bodyW:bw
    };
    if(hat){style.hat=hat;style.hatColor=pick(GEN_SHIRTS)}
    if(ht)style.hairType=ht;
    // random accessories
    var accPool=isFem?GEN_ACCESSORIES_F:GEN_ACCESSORIES_M;
    var acc=pick(accPool);
    if(acc){
      style[acc]=true;
      if(acc==='toteBag')style.toteBagColor=pick(GEN_SHIRTS);
      if(acc==='bigBag')style.bigBagColor=pick(GEN_SHIRTS);
      if(acc==='yogaMat')style.yogaMatColor=pick(['#60A880','#A06080','#6080C0','#C0A040']);
    }
    // 30% get sunglasses
    if(Math.random()<0.3)style.sunglasses=true;
    // 20% chance bouncy walk
    if(Math.random()<0.2)style.bouncy=true;
    // random floral pattern for some
    if(isFem&&Math.random()<0.25)style.floral=true;
    // random mustache for dudes
    if(!isFem&&Math.random()<0.2)style.mustache=true;

    var zoneStart=randInt(15,700);
    var def={
      id:id,name:nm.n,label:labelPool[i%labelPool.length],
      style:style,
      homeZone:[zoneStart,Math.min(zoneStart+200,WORLD_W-20)],
      speed:randInt(10,30),
      favB:[randInt(0,9),randInt(0,9)]
    };
    // random height for some
    if(Math.random()<0.2)def.h=randInt(20,22);
    generated.push(def);

    // generate dialogue for this character
    var sl=shuffle(GEN_SHORT_LINES.slice()).slice(0,5);
    SHORT_LINES[id]=sl;
    var ml=shuffle(GEN_MONOLOGUES.slice()).slice(0,5);
    MONOLOGUES[id]=ml;
  }
  return generated;
}

function drawCharFill(ctx,x,y,s,frame,dir,oc,H){
  H=H||24;var f=dir<0;
  var bw=s.bodyW||8,bx=Math.floor((16-bw)/2);
  // For short chars, apply vertical compression
  var cmp=24-H;
  function px(rx,ry,w,h,color){
    ctx.fillStyle=oc||color;
    var ay=ry;
    if(cmp>0){
      if(ry>=10&&ry<16)ay=ry-Math.floor(cmp*(ry-10)/6);
      else if(ry>=16)ay=ry-cmp;
    }
    if(f)ctx.fillRect(x+15-rx-w+1,y+ay,w,h);
    else ctx.fillRect(x+rx,y+ay,w,h);
  }
  // --- HAIR/HAT ---
  if(s.hat==='beanie'){
    px(4,0,8,4,s.hatColor);px(3,2,10,1,s.hatColor);
  }else if(s.hat==='cap'){
    px(4,1,8,2,s.hatColor);px(9,3,5,1,s.hatColor);px(4,0,8,1,s.hairColor);
  }else if(s.hat==='cap-back'){
    px(4,1,8,2,s.hatColor);px(2,3,4,1,s.hatColor);px(4,0,8,1,s.hairColor);
  }else if(s.hat==='visor'){
    px(8,2,6,1,s.hatColor);px(4,0,8,2,s.hairColor);
  }else{
    px(4,0,8,3,s.hairColor);
    if(s.hairType==='bun'){px(6,-2,4,3,s.hairColor);px(7,-3,2,1,s.hairColor)}
    if(s.hairType==='long'){px(3,3,2,5,s.hairColor);px(11,3,2,5,s.hairColor)}
    if(s.hairType==='up'){px(5,-1,6,2,s.hairColor)}
  }
  // --- HEAD ---
  px(5,3,6,6,s.skin);px(4,5,1,2,s.skin);px(11,5,1,2,s.skin);
  // --- FACE ---
  if(!oc){
    if(s.sunglasses){
      px(5,5,6,2,'#201820');px(5,5,2,2,'#282428');px(9,5,2,2,'#282428');
    }else if(s.roundGlasses){
      px(5,4,3,3,'#C8C0B8');px(6,5,1,1,'#F8F0E8');
      px(9,4,3,3,'#C8C0B8');px(10,5,1,1,'#F8F0E8');px(8,5,1,1,'#C8C0B8');
    }else{
      px(6,5,2,2,'#F0ECE8');px(9,5,2,2,'#F0ECE8');
      px(7,6,1,1,'#181020');px(10,6,1,1,'#181020');
    }
    px(7,8,3,1,lerpColor(s.skin,'#905040',0.35));
  }
  if(s.mustache)px(6,7,4,1,oc||'#3A2510');
  // --- NECK ---
  px(7,9,2,1,s.skin);
  // --- BODY ---
  if(s.hoodie){
    px(bx-1,9,bw+2,7,s.shirt);
    px(4,3,1,3,s.shirt);px(11,3,1,3,s.shirt);
    if(!oc)px(bx,13,bw,1,lerpColor(s.shirt,'#000000',0.15));
  }else{
    px(bx,10,bw,5,s.shirt);
    if(s.sleeveless){
      px(bx,10,2,1,s.shirt);px(bx+bw-2,10,2,1,s.shirt);
      px(bx,11,1,3,s.skin);px(bx+bw-1,11,1,3,s.skin);
    }
    if(s.blazer){
      px(bx-1,10,1,4,s.shirt);px(bx+bw,10,1,4,s.shirt);
      if(!oc){px(bx+1,10,1,4,lerpColor(s.shirt,'#F0E8D8',0.25));
        px(bx+bw-2,10,1,4,lerpColor(s.shirt,'#F0E8D8',0.25))}
    }
  }
  if(!s.sleeveless&&!s.hoodie){px(bx-1,11,1,3,s.skin);px(bx+bw,11,1,3,s.skin)}
  px(bx-1,14,1,1,s.skin);px(bx+bw,14,1,1,s.skin);
  if(s.floral&&!oc){
    px(bx+2,11,1,1,'#F0F0E0');px(bx+4,12,1,1,'#F0F0E0');
    px(bx+1,13,1,1,'#90C890');px(bx+5,11,1,1,'#90C890');
  }
  // --- BELT/PANTS ---
  px(bx,15,bw,1,s.pants);px(bx+1,16,bw-2,2,s.pants);
  // --- LEGS (animated) ---
  var lx1,lx2;
  if(frame===0||frame===2){lx1=bx+2;lx2=bx+bw-4}
  else if(frame===1){lx1=bx+1;lx2=bx+bw-3}
  else{lx1=bx+3;lx2=bx+bw-5}
  px(lx1,18,2,3,s.pants);px(lx1,21,2,2,s.shoes);
  px(lx2,18,2,3,s.pants);px(lx2,21,2,2,s.shoes);
  if(s.barefoot){px(lx1,21,2,2,s.skin);px(lx2,21,2,2,s.skin)}
  // --- ACCESSORIES ---
  if(s.toteBag){px(bx+bw+1,10,2,6,s.toteBagColor);px(bx+bw,10,1,1,s.toteBagColor)}
  if(s.fern){px(bx+bw+2,6,1,4,oc||'#60A048');px(bx+bw+3,5,1,2,oc||'#78B860');px(bx+bw+1,8,1,2,oc||'#508838')}
  if(s.bigBag){px(bx+bw+1,9,4,7,s.bigBagColor);px(bx+bw,9,1,1,s.bigBagColor)}
  if(s.camera){px(6,9,4,2,oc||'#484048');px(7,8,2,1,oc||'#808078')}
  if(s.fannyPack)px(bx,14,bw,2,s.fannyPackColor);
  if(s.coffee){px(bx+bw+1,11,2,3,oc||'#704830');px(bx+bw+1,10,2,1,oc||'#F0E8D8')}
  if(s.shaker){px(bx+bw+1,10,1,4,oc||'#C8C8C0');px(bx+bw+1,10,1,1,oc||'#383830')}
  if(s.yogaMat){px(bx+bw+1,7,2,10,s.yogaMatColor);px(bx+bw,7,1,1,s.yogaMatColor)}
  if(s.phoneEar)px(3,5,1,3,oc||'#303028');
  if(s.phoneHand){px(bx-2,12,1,3,oc||'#303028');if(!oc)px(bx-2,13,1,1,'#60A0F0')}
  if(s.crystal&&!oc){px(7,9,2,1,'#B0A0D0');px(8,10,1,1,'#D0C0F0')}
  if(s.chains&&!oc){px(bx+2,11,1,1,'#F0D040');px(bx+4,12,1,1,'#F0D040');px(bx+3,13,1,1,'#E8C838')}
  if(s.earpiece)px(4,5,1,2,oc||'#282828');
  if(s.airpodsMax){px(4,4,1,4,oc||'#C0C0B8');px(11,4,1,4,oc||'#C0C0B8');px(4,3,2,1,oc||'#D0D0C8');px(10,3,2,1,oc||'#D0D0C8')}
  if(s.sunglassesOnHead)px(5,1,6,1,oc||'#302828');
  if(s.shoppingBag)px(bx+bw+1,12,2,4,s.shoppingBagColor);
  // shadow
  if(!oc){ctx.fillStyle='rgba(0,0,0,0.15)';
    if(!f)ctx.fillRect(x+3,y+23,10,1);else ctx.fillRect(x+3,y+23,10,1)}
}

function drawCharOutlined(ctx,x,y,s,frame,dir,h){
  var ol='#181020';
  drawCharFill(ctx,x-1,y,s,frame,dir,ol,h);
  drawCharFill(ctx,x+1,y,s,frame,dir,ol,h);
  drawCharFill(ctx,x,y-1,s,frame,dir,ol,h);
  drawCharFill(ctx,x,y+1,s,frame,dir,ol,h);
  drawCharFill(ctx,x,y,s,frame,dir,null,h);
}

function cacheSprites(style,h){
  var sprites=[];
  for(var fr=0;fr<4;fr++){for(var d=0;d<2;d++){
    var c=document.createElement('canvas');
    c.width=22;c.height=(h||24)+6;
    var cx=c.getContext('2d');
    drawCharOutlined(cx,3,2,style,fr,d===0?1:-1,h);
    sprites.push(c);
  }}
  return sprites;
}

// CHARACTER AI (basic movement)
// ═══════════════════════════════════════════
function updateChar(ch,dt){
  var def=ch.def;
  // inside building?
  if(ch.insideBuilding){
    ch.insideTimer-=dt;
    if(ch.insideTimer<=0){ch.insideBuilding=false;ch.alpha=1;
      if(ch.needs){ch.needs.hunger=Math.min(100,ch.needs.hunger+30);ch.needs.comfort=Math.min(100,ch.needs.comfort+20)}
    }
    return;
  }
  // needs decay
  if(ch.needs){
    ch.needs.hunger=Math.max(0,ch.needs.hunger-dt*1.2);
    ch.needs.social=Math.max(0,ch.needs.social-dt*0.8);
    ch.needs.comfort=Math.max(0,ch.needs.comfort-dt*0.6);
    ch.needs.inspiration=Math.max(0,ch.needs.inspiration-dt*0.5);
  }
  if(ch.idleTimer>0){ch.idleTimer-=dt;ch.walking=false;
    // regen needs while idle
    if(ch.needs){ch.needs.comfort=Math.min(100,ch.needs.comfort+dt*3);ch.needs.inspiration=Math.min(100,ch.needs.inspiration+dt*2)}
    // chance to enter building when idle near one
    if(ch.idleTimer<=0&&Math.random()<0.15&&!ch.riding&&!ch.sitting){
      for(var bi=0;bi<buildings.length;bi++){
        var b=buildings[bi];
        if(ch.x>=b.x&&ch.x<=b.x+b.w){
          ch.insideBuilding=true;ch.insideTimer=6+Math.random()*12;ch.alpha=0;break;
        }
      }
    }
    return;
  }
  if(ch.targetX===null){
    // needs-driven target selection
    var useNeeds=ch.needs&&Math.random()<0.5;
    if(useNeeds&&ch.needs.hunger<30&&def.favB&&def.favB.length>0){
      // go to favorite building when hungry
      var bi=def.favB[randInt(0,def.favB.length-1)];
      var b=buildings[bi];ch.targetX=b.x+randInt(5,b.w-5);
      ch.needs.hunger=Math.min(100,ch.needs.hunger+40);
    }else if(useNeeds&&ch.needs.social<25){
      // go toward nearest other character
      var near=null,nd=999;
      for(var j=0;j<chars.length;j++){var o=chars[j];if(o!==ch&&Math.abs(o.x-ch.x)<nd){nd=Math.abs(o.x-ch.x);near=o}}
      if(near)ch.targetX=near.x+randInt(-15,15);
      ch.needs.social=Math.min(100,ch.needs.social+30);
    }else if(Math.random()<0.35&&def.favB&&def.favB.length>0){
      var bi=def.favB[randInt(0,def.favB.length-1)];
      var b=buildings[bi];ch.targetX=b.x+randInt(5,b.w-5);
    }else{ch.targetX=randInt(def.homeZone[0],def.homeZone[1])}
    ch.targetX=clamp(ch.targetX,5,WORLD_W-5);
  }
  var dx=ch.targetX-ch.x;
  if(Math.abs(dx)<3){
    ch.targetX=null;ch.idleTimer=1.5+Math.random()*4;ch.walking=false;
  }else{
    ch.dir=dx>0?1:-1;ch.x+=ch.dir*def.speed*dt;ch.walking=true;
  }
  if(ch.walking){ch.walkTimer+=dt*def.speed*0.25;ch.walkFrame=Math.floor(ch.walkTimer)%4}
  else ch.walkFrame=0;
  ch.bounceY=def.style.bouncy&&ch.walking?Math.sin(ch.walkTimer*2)*1.5:0;
  // riding — character cruises back and forth, then dismounts
  if(ch.riding){
    ch.rideTimer-=dt;
    if(ch.rideTimer<=0){
      // release claimed object
      for(var pi=0;pi<placedObjects.length;pi++){
        if(placedObjects[pi].claimed&&placedObjects[pi].type===ch.riding){placedObjects[pi].claimed=false;break}
      }
      ch.def.speed=ch.origSpeed;ch.riding=null;ch.rideY=0;
    }else{
      // keep moving — pick new target when idle
      if(!ch.walking&&ch.targetX===null){
        ch.targetX=randInt(20,WORLD_W-20);
      }
      // bike bob / skateboard lean
      ch.rideY=ch.riding==='bike'?Math.sin(ch.walkTimer*3)*1:0;
    }
  }
  // sitting — character stops at bench, then gets up
  if(ch.sitting){
    ch.sitTimer-=dt;ch.walking=false;ch.walkFrame=0;ch.targetX=null;
    ch.idleTimer=ch.sitTimer+0.5;
    if(ch.sitTimer<=0){
      ch.sitting=false;
      // release claimed bench
      for(var pi=0;pi<placedObjects.length;pi++){
        if(placedObjects[pi].type==='bench'&&placedObjects[pi].claimed&&Math.abs(placedObjects[pi].x-(ch.sitX||0))<10){
          placedObjects[pi].claimed=false;break;
        }
      }
      ch.sitX=null;
    }
  }
  // auto-mount: characters near a placed bike/skateboard will claim it
  if(!ch.riding&&!ch.sitting&&!ch.beingDragged&&!ch.insideBuilding&&Math.random()<0.002){
    for(var pi=0;pi<placedObjects.length;pi++){
      var po=placedObjects[pi];
      if((po.type==='bike'||po.type==='skateboard')&&!po.claimed&&Math.abs(ch.x-po.x)<50){
        ch.riding=po.type;ch.rideTimer=10+Math.random()*12;ch.origSpeed=ch.def.speed;
        ch.def.speed=po.type==='bike'?45:35;ch.rideY=0;
        po.claimed=true;
        if(po.type==='bike')sfxRide();else sfxSkate();
        autoBubbles.push({ch:ch,text:po.type==='bike'?"Let's ride!":"Shred it!",timer:3,fade:1});
        break;
      }
    }
  }
  // auto-sit: characters near a placed bench will sit
  if(!ch.sitting&&!ch.riding&&!ch.beingDragged&&!ch.insideBuilding&&!ch.walking&&Math.random()<0.003){
    for(var pi=0;pi<placedObjects.length;pi++){
      var po=placedObjects[pi];
      if(po.type==='bench'&&!po.claimed&&Math.abs(ch.x-po.x)<30){
        ch.sitting=true;ch.sitTimer=8+Math.random()*14;ch.sitX=po.x;
        ch.targetX=null;ch.walking=false;ch.idleTimer=ch.sitTimer+1;
        po.claimed=true;
        autoBubbles.push({ch:ch,text:pick(["Ahh, nice","Finally","Rest time","Perfect"]),timer:2.5,fade:1});
        break;
      }
    }
  }
}

function drawCharacters(ctx,camX){
  var time=getTimeInfo();
  for(var i=0;i<chars.length;i++){
    var ch=chars[i];
    if(ch.beingDragged||ch.insideBuilding)continue;
    var sx=Math.floor(ch.x-camX-3);
    var sy=Math.floor(CHAR_FEET-ch.spriteH-2+ch.bounceY);
    // sitting — character appears seated (shifted down, legs hidden by bench)
    if(ch.sitting)sy+=5;
    // riding — bike: raised up on bike, skateboard: slight lean
    if(ch.riding){
      sy-=ch.riding==='bike'?6:2;
      sy+=Math.floor(ch.rideY||0);
    }
    if(sx<-22||sx>viewW+22)continue;
    var si=ch.walkFrame*2+(ch.dir<0?1:0);
    if(ch.alpha<1)ctx.globalAlpha=ch.alpha;
    ctx.drawImage(ch.sprites[si],sx,sy);
    // draw ride vehicle under character
    if(ch.riding){
      var ry=Math.floor(CHAR_FEET-2);
      if(ch.riding==='bike'){
        ctx.fillStyle='#383030';
        ctx.fillRect(sx+1,ry-3,2,6);ctx.fillRect(sx+11,ry-3,2,6);
        ctx.fillStyle='#D04030';
        ctx.fillRect(sx+3,ry-1,8,1);ctx.fillRect(sx+5,ry-5,1,5);
        ctx.fillStyle='#808078';ctx.fillRect(sx+3,ry-6,4,1);
      }else{
        ctx.fillStyle='#C8A050';ctx.fillRect(sx,ry,12,2);
        ctx.fillStyle='#484040';ctx.fillRect(sx+1,ry+2,2,1);ctx.fillRect(sx+9,ry+2,2,1);
      }
    }
    if(time.bright<0.85){
      ctx.globalAlpha=Math.max(0,(1-time.bright)*0.35*(ch.alpha||1));ctx.fillStyle='#181030';
      ctx.fillRect(sx+2,sy+1,16,ch.spriteH);
    }
    ctx.globalAlpha=1;
  }
  // draw dragged character last (on top)
  for(var i=0;i<chars.length;i++){
    var ch=chars[i];
    if(!ch.beingDragged)continue;
    var sx=Math.floor(ch.x-camX-3),sy=Math.floor(ch.dragY-ch.spriteH/2);
    var si=ch.walkFrame*2+(ch.dir<0?1:0);
    ctx.globalAlpha=0.85;ctx.drawImage(ch.sprites[si],sx,sy);ctx.globalAlpha=1;
  }
}

var birds=[],birdTimer=0;
function spawnBird(){
  var dir=Math.random()>0.5?1:-1;
  birds.push({x:dir>0?-10:WORLD_W+10,y:12+Math.random()*55,
    speed:18+Math.random()*25,dir:dir,frame:0,timer:0,ws:0.3+Math.random()*0.3});
}
var poops=[],POOP_LINES=["Nah really?!","Seriously?!","Not again omg","Why me tho?!","Bird...WHY","I literally can't","Oh COME ON"];
function updateBirds(dt){
  birdTimer+=dt;
  if(birdTimer>2.5+Math.random()*4){birdTimer=0;if(birds.length<8)spawnBird()}
  for(var i=birds.length-1;i>=0;i--){
    var b=birds[i];b.x+=b.dir*b.speed*dt;b.y+=Math.sin(b.timer*2)*0.2;
    b.timer+=dt;b.frame=Math.floor(b.timer/b.ws)%2;
    // rare poop event
    if(Math.random()<0.0004){
      poops.push({x:b.x,y:b.y,vy:0,landed:false,timer:4});
    }
    if(b.x<-20||b.x>WORLD_W+20)birds.splice(i,1);
  }
  // update poops
  for(var i=poops.length-1;i>=0;i--){
    var p=poops[i];
    if(!p.landed){p.vy+=120*dt;p.y+=p.vy*dt;
      if(p.y>=CHAR_FEET-4){p.landed=true;p.y=CHAR_FEET-2;
        // check if hit a character
        for(var j=0;j<chars.length;j++){var ch=chars[j];
          if(!ch.beingDragged&&Math.abs(ch.x-p.x)<10){
            var has=false;for(var k=0;k<autoBubbles.length;k++)if(autoBubbles[k].ch===ch)has=true;
            if(!has){autoBubbles.push({ch:ch,text:pick(POOP_LINES),timer:3,fade:1});sfxPoop()}break;
          }
        }
      }
    }
    p.timer-=dt;if(p.timer<=0)poops.splice(i,1);
  }
}
function drawBirds(ctx,camX){
  var time=getTimeInfo(),c=time.bright>0.5?'#383030':'#505060';ctx.fillStyle=c;
  for(var i=0;i<birds.length;i++){
    var b=birds[i],sx=Math.floor(b.x-camX*0.15),sy=Math.floor(b.y);
    if(sx<-5||sx>viewW+5)continue;
    if(b.frame===0){ctx.fillRect(sx,sy,1,1);ctx.fillRect(sx+1,sy+1,1,1);ctx.fillRect(sx+2,sy,1,1)}
    else{ctx.fillRect(sx,sy+1,1,1);ctx.fillRect(sx+1,sy,1,1);ctx.fillRect(sx+2,sy+1,1,1)}
  }
  // draw poops
  for(var i=0;i<poops.length;i++){
    var p=poops[i],sx=Math.floor(p.x-camX),sy=Math.floor(p.y);
    if(sx<-2||sx>viewW+2)continue;
    ctx.fillStyle='#F0F0E0';ctx.fillRect(sx,sy,2,2);
    if(p.landed){ctx.fillRect(sx-1,sy+1,1,1);ctx.fillRect(sx+2,sy+1,1,1)}
  }
}

      speed:8+Math.random()*10,frame:0,timer:0,

var DOG_REACTIONS=["Aww puppy!","Good boy omg","Who's a good boy!","So cute I can't","Pet pet pet","Hi little guy!","Hi buddy!","Obsessed rn"];
function updateDogs(dt){
  for(var i=0;i<dogs.length;i++){
    var d=dogs[i];
    if(d.idleTimer>0){d.idleTimer-=dt;continue}
    // sometimes go toward a nearby character
    if(d.targetX===null&&Math.random()<0.3){
      var near=null,nd=999;
      for(var j=0;j<chars.length;j++){var ch=chars[j];if(!ch.beingDragged&&Math.abs(ch.x-d.x)<nd){nd=Math.abs(ch.x-d.x);near=ch}}
      if(near&&nd<150){
        d.targetX=near.x+randInt(-8,8);d.followChar=near;
      }else d.targetX=randInt(30,WORLD_W-30);
    }else if(d.targetX===null)d.targetX=randInt(30,WORLD_W-30);
    var dx=d.targetX-d.x;
    if(Math.abs(dx)<3){
      d.targetX=null;d.idleTimer=2+Math.random()*6;
      // dog reached a character? character reacts
      if(d.followChar&&Math.abs(d.followChar.x-d.x)<20){
        var ch=d.followChar;
        var has=false;for(var k=0;k<autoBubbles.length;k++)if(autoBubbles[k].ch===ch)has=true;
        if(!has)autoBubbles.push({ch:ch,text:pick(DOG_REACTIONS),timer:2.5,fade:1});
        d.followChar=null;
      }
    }else{d.dir=dx>0?1:-1;d.x+=d.dir*d.speed*dt;d.timer+=dt*d.speed*0.3;d.frame=Math.floor(d.timer)%2}
  }
}
function drawDogs(ctx,camX){
  var time=getTimeInfo();
  for(var i=0;i<dogs.length;i++){
    var d=dogs[i],sx=Math.floor(d.x-camX),sy=CHAR_FEET+1;
    if(sx<-10||sx>viewW+10)continue;
    var w=d.size?10:7,h=d.size?6:4;
    var c=bc(d.color,time),ol='#181020';
    // outline
    ctx.fillStyle=ol;ctx.fillRect(sx-1,sy,w+2,1);ctx.fillRect(sx-1,sy+h+1,w+2,1);
    ctx.fillRect(sx-1,sy,1,h+1);ctx.fillRect(sx+w,sy,1,h+1);
    // body
    ctx.fillStyle=c;ctx.fillRect(sx,sy+1,w,h);

    ctx.fillStyle=c;
    if(d.dir>0){ctx.fillRect(sx+w-1,sy-1,3,3);ctx.fillStyle=ol;ctx.fillRect(sx+w-1,sy-2,4,1);ctx.fillRect(sx+w+2,sy-1,1,3);ctx.fillRect(sx+w+1,sy-1,1,1)}
    else{ctx.fillRect(sx-2,sy-1,3,3);ctx.fillStyle=ol;ctx.fillRect(sx-3,sy-2,4,1);ctx.fillRect(sx-3,sy-1,1,3);ctx.fillRect(sx-2,sy-1,1,1)}
    // tail
    ctx.fillStyle=c;
    var tu=d.idleTimer>0||d.frame===0;
    if(d.dir>0)ctx.fillRect(sx-1,sy+(tu?-1:1),1,2);
    else ctx.fillRect(sx+w,sy+(tu?-1:1),1,2);

    }else{
      ctx.fillRect(sx,sy+h+1,1,2);ctx.fillRect(sx+w-1,sy+h+1,1,2);
    }
  }
}

var ELDER_IDS=['halmoni','wei','tio','gary'];
function getObjReaction(type,chId){
  var isElder=ELDER_IDS.indexOf(chId)>=0;
  // generated chars: check if name suggests elder
  if(!isElder&&chId.indexOf('gen_')===0){
    for(var i=0;i<chars.length;i++){
      if(chars[i].def.id===chId&&chars[i].def.name.indexOf('Grandpa')>=0||
         chars[i].def.id===chId&&chars[i].def.name.indexOf('Auntie')>=0||
         chars[i].def.id===chId&&chars[i].def.name.indexOf('Old Man')>=0||
         chars[i].def.id===chId&&chars[i].def.name.indexOf('Nana')>=0){isElder=true;break}
    }
  }
  var pool=isElder?OBJ_LINES_OLD[type]:OBJ_LINES_YOUNG[type];
  if(!pool)pool=OBJ_LINES_YOUNG[type]||["Nice"];
  return pick(pool);
}
function placeObject(type,wx){
  // prevent clustering — minimum distance between same-type objects
  var minDist=(type==='bike'||type==='skateboard')?60:30;
  for(var i=0;i<placedObjects.length;i++){
    if(placedObjects[i].type===type&&Math.abs(placedObjects[i].x-wx)<minDist)return;
  }
  sfxPlace();
  placedObjects.push({type:type,x:wx,timer:45+Math.random()*30,opacity:1});
  // nearby characters react
  for(var i=0;i<chars.length;i++){
    var ch=chars[i];
    if(Math.abs(ch.x-wx)<120){
      ch.targetX=wx+randInt(-15,15);ch.idleTimer=0;
      // rideable objects — character mounts and gets speed boost
      if((type==='bike'||type==='skateboard')&&Math.abs(ch.x-wx)<40&&!ch.riding&&!ch.sitting){
        ch.riding=type;ch.rideTimer=8+Math.random()*10;ch.origSpeed=ch.def.speed;
        ch.def.speed=type==='bike'?45:35;
      }
      // bench — nearest character sits
      if(type==='bench'&&Math.abs(ch.x-wx)<30&&!ch.sitting&&!ch.riding){
        ch.sitting=true;ch.sitTimer=10+Math.random()*15;ch.sitX=wx;
        ch.targetX=wx;ch.idleTimer=ch.sitTimer+1;
      }
      // any nearby character reacts to placed object
      if(!ch.insideBuilding){
        var has=false;for(var j=0;j<autoBubbles.length;j++)if(autoBubbles[j].ch===ch)has=true;
        if(!has)autoBubbles.push({ch:ch,text:getObjReaction(type,ch.def.id),timer:3.5,fade:1});
      }
    }
  }
}
var OBJ_GONE_LINES=["Wait who took that?","It was literally just here","LA man...","Somebody got it","Gone. Classic LA.","Not again omg","That was fast honestly"];
function updatePlacedObjects(dt){
  for(var i=placedObjects.length-1;i>=0;i--){
    var o=placedObjects[i];o.timer-=dt;
    if(o.timer<10)o.opacity=o.timer/10;
    if(o.timer<=0){
      // nearby character reacts to disappearance
      for(var j=0;j<chars.length;j++){
        var ch=chars[j];
        if(!ch.beingDragged&&!ch.insideBuilding&&Math.abs(ch.x-o.x)<40){
          var has=false;for(var k=0;k<autoBubbles.length;k++)if(autoBubbles[k].ch===ch)has=true;
          if(!has){autoBubbles.push({ch:ch,text:pick(OBJ_GONE_LINES),timer:3,fade:1});break}
        }
      }
      placedObjects.splice(i,1);
    }
  }
}
function drawPlacedObjects(ctx,camX){
  var time=getTimeInfo();
  for(var i=0;i<placedObjects.length;i++){
    var o=placedObjects[i],sx=Math.floor(o.x-camX),sy=CHAR_FEET-2;
    if(sx<-20||sx>viewW+20)continue;
    ctx.globalAlpha=o.opacity;
    switch(o.type){
      case'bench':ctx.fillStyle=bc('#887050',time);ctx.fillRect(sx,sy,16,3);ctx.fillRect(sx,sy-4,16,2);
        ctx.fillStyle=bc('#605040',time);ctx.fillRect(sx+1,sy+3,2,3);ctx.fillRect(sx+13,sy+3,2,3);break;

// ═══════════════════════════════════════════
var autoBubbles=[],autoTimer=1.5;
function updateAutoBubbles(dt){
  autoTimer-=dt;
  if(autoTimer<=0){
    autoTimer=2.5+Math.random()*4;
    var vis=[];for(var i=0;i<chars.length;i++){
      var ch=chars[i];if(ch.x>cameraX-30&&ch.x<cameraX+viewW+30&&!ch.beingDragged&&!ch.insideBuilding)vis.push(ch);
    }
    if(vis.length>0){
      var ch=vis[randInt(0,vis.length-1)];
      var lines=SHORT_LINES[ch.def.id];
      if(lines&&lines.length>0){
        var has=false;for(var j=0;j<autoBubbles.length;j++)if(autoBubbles[j].ch===ch)has=true;
        if(!has&&autoBubbles.length<4){autoBubbles.push({ch:ch,text:lines[randInt(0,lines.length-1)],timer:3+Math.random()*2.5,fade:1});sfxBubble()}
      }
    }
  }
  for(var i=autoBubbles.length-1;i>=0;i--){
    autoBubbles[i].timer-=dt;
    if(autoBubbles[i].timer<0.5)autoBubbles[i].fade=autoBubbles[i].timer/0.5;
    if(autoBubbles[i].timer<=0)autoBubbles.splice(i,1);
  }
}
function drawBubble(ctx,wx,wy,text,camX){
  var sx=Math.floor(wx-camX),sy=Math.floor(wy);
  var tw=text.length*4+6,th=9;
  var bx=sx-Math.floor(tw/2),by=sy;
  if(bx<2)bx=2;if(bx+tw>viewW-2)bx=viewW-tw-2;
  // bg
  ctx.fillStyle='#F8F0E0';ctx.fillRect(bx,by,tw,th);
  // border
  ctx.fillStyle='#282020';
  ctx.fillRect(bx-1,by-1,tw+2,1);ctx.fillRect(bx-1,by+th,tw+2,1);
  ctx.fillRect(bx-1,by,1,th);ctx.fillRect(bx+tw,by,1,th);
  // pointer
  ctx.fillStyle='#F8F0E0';ctx.fillRect(sx-1,by+th,3,1);
  ctx.fillStyle='#282020';ctx.fillRect(sx,by+th+1,1,1);
  // text
  drawText(ctx,text,bx+3,by+2,'#282020',1);
}
function drawAutoBubbles(ctx,camX){
  for(var i=0;i<autoBubbles.length;i++){
    var b=autoBubbles[i];
    if(b.fade<1)ctx.globalAlpha=Math.max(0,b.fade);
    drawBubble(ctx,b.ch.x,CHAR_FEET-b.ch.spriteH-14+b.ch.bounceY,b.ch.def.name.split(' ')[0]+': '+b.text,camX);
    if(b.fade<1)ctx.globalAlpha=1;
  }
}

  var tb=document.getElementById('toolbar');tb.style.display='flex';
  TOOL_TYPES.forEach(function(type){
    var item=document.createElement('div');item.className='tool-item';item.dataset.tool=type;
    var c=document.createElement('canvas');c.width=32;c.height=32;c.style.width='32px';c.style.height='32px';
    c.style.imageRendering='pixelated';var cx=c.getContext('2d');cx.imageSmoothingEnabled=false;
    drawToolIcon(cx,type);item.appendChild(c);
    var lbl=document.createElement('div');lbl.className='tool-label';lbl.textContent=TOOL_LABELS[type]||type;
    item.appendChild(lbl);
    // desktop: mousedown starts drag-to-place
    item.addEventListener('mousedown',function(e){
      e.stopPropagation();e.preventDefault();
      selectedTool=type;
      tb.querySelectorAll('.tool-item').forEach(function(el){el.style.borderColor='rgba(255,255,255,0.3)'});
      item.style.borderColor='#F0D040';
      dragMode='tool';setCursor('place');
    });
    // mobile: track touch to distinguish tap vs scroll
    var tStart=null,tMoved=false;
    item.addEventListener('touchstart',function(e){tStart={x:e.touches[0].clientX,y:e.touches[0].clientY};tMoved=false},{passive:true});
    item.addEventListener('touchmove',function(e){if(tStart){var dx=e.touches[0].clientX-tStart.x,dy=e.touches[0].clientY-tStart.y;if(Math.abs(dx)>6||Math.abs(dy)>6)tMoved=true}},{passive:true});
    item.addEventListener('touchend',function(e){
      if(!tMoved){
        e.preventDefault();
        if(selectedTool===type){selectedTool=null;item.style.borderColor='rgba(255,255,255,0.3)'}
        else{selectedTool=type;tb.querySelectorAll('.tool-item').forEach(function(el){el.style.borderColor='rgba(255,255,255,0.3)'});item.style.borderColor='#F0D040'}
      }
      tStart=null;tMoved=false;
    },{passive:false});
    // desktop click toggle
    item.addEventListener('click',function(e){
      e.stopPropagation();
      if(selectedTool===type&&dragMode!=='tool'){selectedTool=null;item.style.borderColor='rgba(255,255,255,0.3)';setCursor('default')}
      else{selectedTool=type;tb.querySelectorAll('.tool-item').forEach(function(el){el.style.borderColor='rgba(255,255,255,0.3)'});item.style.borderColor='#F0D040';setCursor('place')}
    });

  setTimeout(function(){

  },100);
}

// RENDER
// ═══════════════════════════════════════════
function render(){
  if(skyDirty)renderSky();
  if(buildingsDirty){renderBackground();renderBuildings()}

  cctx.clearRect(0,0,comp.width,comp.height);
  // sky (parallax 0.1)
  var skyOff=Math.floor(cameraX*0.1);
  cctx.drawImage(skyLayer,skyOff,0,viewW,WORLD_H,0,0,viewW,WORLD_H);
  // background (parallax 0.35)
  var bgOff=Math.floor(cameraX*0.35);
  cctx.drawImage(bgLayer,bgOff,0,viewW,WORLD_H,0,0,viewW,WORLD_H);
  // buildings (1:1)
  var bOff=Math.floor(cameraX);
  cctx.drawImage(bldgLayer,bOff,0,viewW,WORLD_H,0,0,viewW,WORLD_H);

  // birds (in sky, above buildings)
  drawBirds(cctx,cameraX);
  // placed objects
  drawPlacedObjects(cctx,cameraX);
  // dogs
  drawDogs(cctx,cameraX);
  // characters
  drawCharacters(cctx,cameraX);
  // vehicles on road
  drawVehicles(cctx,cameraX);
  // speech bubbles & conversations
  drawAutoBubbles(cctx,cameraX);
  drawConversation(cctx,cameraX);

  // scale to display
  ctx.imageSmoothingEnabled=false;
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.drawImage(comp,0,0,viewW,WORLD_H,0,0,canvas.width,canvas.height);
}

// ═══════════════════════════════════════════
// UPDATE
// ═══════════════════════════════════════════
function update(dt){
  if(!isDragging&&Math.abs(velocity)>0.5){
    cameraX=clamp(cameraX+velocity*dt,0,maxCamX());
    velocity*=0.92;
  }else if(!isDragging){velocity=0}
  // update characters
  for(var i=0;i<chars.length;i++){
    var ch=chars[i];
    if(!ch.beingDragged){
      if(ch.returnTimer>0){ch.returnTimer-=dt;
        if(ch.returnTimer<=0){ch.targetX=randInt(ch.def.homeZone[0],ch.def.homeZone[1]);ch.idleTimer=0}
      }
      updateChar(ch,dt);
    }
  }
  // animals & vehicles
  updateBirds(dt);updateDogs(dt);updateVehicles(dt);updatePlacedObjects(dt);
  // auto-bubbles & conversations
  updateAutoBubbles(dt);updateConversations(dt);
  // monologue timer
  if(activeMonologue){monologueTimer-=dt;if(monologueTimer<=0)hideMonologue();else positionMonologue()}
  gameTime+=dt;
  steamFrame+=dt*3;
  // redraw time-dependent layers every ~30s
  if(Math.floor(gameTime/30)!==Math.floor((gameTime-dt)/30)){
    skyDirty=true;buildingsDirty=true;
  }
}

// GAME LOOP
// ═══════════════════════════════════════════
function gameLoop(ts){
  var dt=Math.min((ts-lastTime)/1000,0.1);
  lastTime=ts;
  update(dt);render();
  requestAnimationFrame(gameLoop);
}

cameraX=clamp(WORLD_W/2-viewW/2,0,maxCamX());

// custom pixel art cursors
function makeCursor(pixels,w,h,hx,hy){
  var sz=2,c=document.createElement('canvas');c.width=w*sz;c.height=h*sz;
  var cx=c.getContext('2d');
  for(var y=0;y<h;y++)for(var x=0;x<w;x++){
    var col=pixels[y*w+x];
    if(col){cx.fillStyle=col;cx.fillRect(x*sz,y*sz,sz,sz)}
  }
  return'url('+c.toDataURL()+') '+(hx*sz)+' '+(hy*sz)+', auto';
}
var _='#181020',W='#F0E8D8',S='#C89868',Y='#F0D040',R='#E85030',O=null;
var curDefault=makeCursor([
  O,_,O,O,O,O,O,O,
  O,_,_,O,O,O,O,O,
  O,_,W,_,O,O,O,O,
  O,_,W,W,_,O,O,O,
  O,_,W,W,W,_,O,O,
  O,_,W,W,W,W,_,O,
  O,_,W,W,W,W,W,_,
  O,_,W,W,W,_,_,_,
  O,_,W,W,_,O,O,O,
  O,_,O,_,W,_,O,O,
  O,O,O,O,_,_,O,O
],8,11,1,1);
var curGrab=makeCursor([
  O,O,_,_,O,_,_,O,_,_,O,O,
  O,_,S,S,_,S,S,_,S,S,_,O,
  O,_,S,S,_,S,S,_,S,S,_,O,
  _,_,S,S,S,S,S,S,S,S,_,O,
  _,S,S,S,S,S,S,S,S,S,_,O,
  _,S,S,S,S,S,S,S,S,S,_,O,
  O,_,S,S,S,S,S,S,S,_,O,O,
  O,_,S,S,S,S,S,S,S,_,O,O,
  O,O,_,S,S,S,S,S,_,O,O,O,
  O,O,O,_,_,_,_,_,O,O,O,O
],12,10,5,4);
var curPlace=makeCursor([
  O,O,O,O,Y,Y,O,O,O,O,
  O,O,O,O,Y,Y,O,O,O,O,
  O,O,O,O,O,O,O,O,O,O,
  O,O,O,O,O,O,O,O,O,O,
  Y,Y,O,O,R,R,O,O,Y,Y,
  Y,Y,O,O,R,R,O,O,Y,Y,
  O,O,O,O,O,O,O,O,O,O,
  O,O,O,O,O,O,O,O,O,O,
  O,O,O,O,Y,Y,O,O,O,O,
  O,O,O,O,Y,Y,O,O,O,O
],10,10,5,5);
var curHover=makeCursor([
  O,O,O,_,_,O,O,O,O,O,

],10,11,4,1);
canvas.style.cursor=curDefault;
var cursorState='default';
function setCursor(state){
  if(state===cursorState)return;cursorState=state;
  switch(state){
    case'grab':canvas.style.cursor=curGrab;break;
    case'place':canvas.style.cursor=curPlace;break;
    case'hover':canvas.style.cursor=curHover;break;

// ═══════════════════════════════════════════
// SOUND SYSTEM (Web Audio API)
// ═══════════════════════════════════════════
var audioCtx=null,soundOn=false;
function initAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();if(audioCtx.state==='suspended')audioCtx.resume()}
function playTone(freq,dur,type,vol){
  if(!soundOn||!audioCtx)return;
  var o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.type=type||'square';o.frequency.value=freq;
  g.gain.value=vol||0.06;g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+dur);
  o.connect(g);g.connect(audioCtx.destination);
  o.start(audioCtx.currentTime);o.stop(audioCtx.currentTime+dur);
}
function sfxTap(){playTone(880,0.08,'square',0.05);playTone(1100,0.06,'square',0.03)}
function sfxPlace(){playTone(440,0.1,'triangle',0.06);playTone(550,0.08,'triangle',0.04)}
function sfxBubble(){playTone(660,0.06,'sine',0.03);playTone(880,0.04,'sine',0.02)}
function sfxDrop(){playTone(220,0.15,'sawtooth',0.04);playTone(180,0.1,'sawtooth',0.03)}
function sfxPoop(){playTone(150,0.2,'sawtooth',0.05);playTone(100,0.15,'sawtooth',0.03)}
function sfxRide(){playTone(280,0.12,'triangle',0.03);playTone(350,0.08,'triangle',0.02)}
function sfxSkate(){playTone(200,0.15,'sawtooth',0.02);playTone(260,0.1,'sawtooth',0.015)}
// ambient drone + intermittent traffic
var ambientNode=null,trafficInterval=null;
function startAmbient(){
  if(!audioCtx||ambientNode)return;
  // low city hum
  ambientNode=audioCtx.createOscillator();var g=audioCtx.createGain();
  ambientNode.type='sine';ambientNode.frequency.value=55;
  g.gain.value=0.012;
  ambientNode.connect(g);g.connect(audioCtx.destination);
  ambientNode.start();
  // intermittent traffic — random honks and engine pass-bys
  trafficInterval=setInterval(function(){
    if(!soundOn||!audioCtx)return;
    var r=Math.random();
    if(r<0.3){
      // car pass-by: low rumble that fades
      playTone(80+Math.random()*40,0.6+Math.random()*0.8,'sawtooth',0.008+Math.random()*0.006);
    }else if(r<0.45){
      // distant honk
      playTone(340+Math.random()*60,0.15+Math.random()*0.1,'square',0.012);
    }else if(r<0.55){
      // truck rumble
      playTone(50+Math.random()*20,1.0+Math.random()*0.5,'sawtooth',0.006);
    }
  },3000+Math.random()*4000);
}
function stopAmbient(){if(ambientNode){ambientNode.stop();ambientNode=null}if(trafficInterval){clearInterval(trafficInterval);trafficInterval=null}}
// toggle button
// unlock audio on first user interaction (required by iOS Safari & some Android)
function unlockAudio(){initAudio();document.removeEventListener('touchstart',unlockAudio);document.removeEventListener('click',unlockAudio)}
document.addEventListener('touchstart',unlockAudio,{passive:true});
document.addEventListener('click',unlockAudio);
var sndBtn=document.getElementById('sound-toggle');
sndBtn.addEventListener('click',function(){
  initAudio();soundOn=!soundOn;
  sndBtn.textContent=soundOn?'SFX: ON':'SFX: OFF';
  if(soundOn){sndBtn.classList.add('on');startAmbient();sfxTap()}
  else{sndBtn.classList.remove('on');stopAmbient()}
});

  var ip=document.getElementById('idle-prompt');if(ip)ip.style.display='none';idleShown=false;
}
['mousedown','touchstart','wheel','keydown'].forEach(function(evt){

    idleShown=true;
